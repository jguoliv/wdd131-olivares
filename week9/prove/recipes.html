<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe Book</title>

    <meta property="og:type" content="website">
    <meta property="og:title" content="Recipe Book">
    <meta property="og:description" content="A simple recipe collection including delicious homemade favorites.">
    <meta property="og:url" content="https://yourgithubusername.github.io/wdd131/recipes">
    <meta property="og:image" content="images/social-preview-image.png">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Recipe Book">
    <meta name="twitter:description" content="A simple recipe collection including delicious homemade favorites.">
    <meta name="twitter:image" content="images/social-preview-image.png">

    <link rel="icon" href="/favicon.ico">
    <link rel="apple-touch-icon" href="images/apple-touch-icon.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="recipes.css">
    <script src="recipes.js" defer></script>
</head>

<body>

    <header>
        <img src="images/recipe-book.png" alt="Recipe Book Logo" id="logo">
        <h1 id="title">Recipe Book</h1>
    </header>

    <main>

        <div class="search">
            <form class="search-box">
                <input type="text" id="searchInput" placeholder="Find a recipe">
                <div class="divider"></div>
                <button class="search-button" type="submit">
                    <img src="images/search.svg" alt="Search Icon" id="searchIcon">
                </button>
            </form>
        </div>

        <hr>

        <section id="recipeList">

            <div class="recipeCard">

                <img src="images/apple-crisp.jpg" alt="Apple Crisp" class="recipeImage">

                <div class="recipeInfo">

                    <button class="recipeCategory">dessert</button>

                    <h2 class="recipeTitle">Apple Crisp</h2>

                    <span
                        class="rating"
                        role="img"
                        aria-label="Rating: 4 out of 5 stars"
                    >
                        <span aria-hidden="true" class="icon-star">⭐</span>
                        <span aria-hidden="true" class="icon-star">⭐</span>
                        <span aria-hidden="true" class="icon-star">⭐</span>
                        <span aria-hidden="true" class="icon-star">⭐</span>
                        <span aria-hidden="true" class="icon-star-empty">☆</span>
                    </span>

                    <p class="recipeDescription">
                        This apple crisp recipe is a simple yet delicious fall dessert that's great served warm with vanilla ice cream.
                    </p>

                </div>

            </div>

        </section>

    </main>

    <footer>

        <a href="https://www.flaticon.com/free-icons/recipe" title="recipe icons">
            Recipe icons created by Freepik - Flaticon
        </a>

        <div class="social">
            <a href="#">
                <img src="images/instagram_icon.svg" alt="instagram icon">
            </a>
            <a href="#">
                <img src="images/youtube_icon.svg" alt="youtube icon">
            </a>
            <a href="#">
                <img src="images/pinterest_icon.svg" alt="pinterest icon">
            </a>
        </div>

    </footer>

</body>
</html>
