<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="description" content="Jose Ulloque's web development portfolio — WDD 131 projects." />
    <title>Projects | Jose Ulloque</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body class="projects-page">
    <header>
        <nav>
            <a href="index.html">Home</a>
            <a href="index.html" class="logo-link">
                <img class="logo" src="images/logo.png" alt="Jose Ulloque logo" />
            </a>
            <a href="projects.html">Projects</a>
        </nav>
    </header>
    <section class="hero hero--projects-page">
        <div class="hero-bar"></div>
        <div class="hero-card hero-card--projects-header">
            <div class="hero-content">
                <h1>Projects</h1>
                <p class="hero-subtitle">Check out the assignments I built in WDD 131.</p>
            </div>
            <div class="hero-image">
                <img src="images/projects-overview-dark.png" alt="Computer showing a website project" />
            </div>
        </div>
    </section>
    <div class="search-section">
        <div class="stats-bar" role="status" aria-live="polite"></div>
        <div class="search-container">
            <input 
                type="text" 
                id="project-search"
                class="search-input" 
                placeholder="Search by title, week, type, or topic..."
                aria-label="Search projects by title, week, type, or topic"
            />
        </div>
    </div>
    <main class="featured-projects" aria-label="All projects" role="region">
    </main>
    <footer>
        <p>Copyright © 2026 Jose Ulloque</p>
    </footer>
    <script src="script.js" type="module"></script>
</body>
</html>
